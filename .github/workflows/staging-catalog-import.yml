# Import catálogo a Neon/Railway cuando los secrets están configurados en el repo.
# Secrets requeridos: STAGING_DATABASE_URL, STAGING_CATALOG_INTERNAL_API_TOKEN
name: Staging catalog import

on:
  workflow_dispatch:

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Import venues to staging catalog
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          CATALOG_INTERNAL_API_TOKEN: ${{ secrets.STAGING_CATALOG_INTERNAL_API_TOKEN }}
          CATALOG_SERVICE_URL: ${{ vars.STAGING_CATALOG_SERVICE_URL || 'https://floitcatalog-service-production.up.railway.app' }}
        run: |
          test -n "$DATABASE_URL"
          test -n "$CATALOG_INTERNAL_API_TOKEN"
          pnpm --filter @floit/catalog-service build
          pnpm staging:bootstrap -- --import-only || pnpm venues:import:staging
