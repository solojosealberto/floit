openapi: 3.1.0
info:
  title: QueGym Search API
  version: 0.2.0
  description: |
    Discovery (lista/mapa): delega en catalog según query string. Respuesta
    alineada con `DiscoveryResponse` en `@floit/contracts`.
servers:
  - url: http://localhost:4011
paths:
  /health:
    get:
      operationId: health
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  service: { type: string }
  /v1/search:
    get:
      operationId: searchVenues
      summary: Búsqueda principal (proxy al catalog con mismos query params)
      parameters:
        - name: q
          in: query
          schema: { type: string }
        - name: zone
          in: query
          schema: { type: string }
        - name: venue_type
          in: query
          schema: { type: string }
        - name: modality
          in: query
          schema: { type: string }
        - name: budget_min
          in: query
          schema: { type: number }
        - name: budget_max
          in: query
          schema: { type: number }
        - name: lat
          in: query
          schema: { type: number }
        - name: lng
          in: query
          schema: { type: number }
        - name: radius_km
          in: query
          schema: { type: number }
        - name: sort
          in: query
          schema:
            type: string
            enum: [relevance, distance, price_asc, price_desc, name, popularity]
      responses:
        "200":
          description: Resultados discovery
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DiscoveryResponse" }
  /v1/meta/zones:
    get:
      operationId: searchZones
      summary: Zonas (delegado a catalog)
      responses:
        "200":
          description: Igual que catalog `/v1/meta/zones`
          content:
            application/json:
              schema:
                type: object
                required: [zones]
                properties:
                  zones:
                    type: array
                    items: { type: string }
components:
  schemas:
    VenueSummary:
      type: object
      required:
        [id, slug, name, address, zone, lat, lng, venueType, modalities, amenities]
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        name: { type: string }
        address: { type: string }
        zone: { type: string }
        lat: { type: number }
        lng: { type: number }
        venueType: { type: string }
        modalities:
          type: array
          items: { type: string }
        amenities:
          type: array
          items: { type: string }
        priceMin: { type: number, nullable: true }
        priceMax: { type: number, nullable: true }
        completenessScore: { type: number, nullable: true }
        popularityScore: { type: number }
        verificationStatus: { type: string }
        allowsTrial: { type: boolean }
        activePromotionTitle: { type: string, nullable: true }
        distanceM: { type: number }
    DiscoveryResponse:
      type: object
      required: [items, meta]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/VenueSummary" }
        meta:
          type: object
          required: [total]
          properties:
            total: { type: integer }
            sort: { type: string }
            lat: { type: number }
            lng: { type: number }
            radius_km: { type: number }
