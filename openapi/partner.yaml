openapi: 3.1.0
info:
  title: QueGym Partner API
  version: 0.1.0
  description: |
    Autoservicio partner (Sprint 4): claim, ownership, perfil y planes.
servers:
  - url: http://localhost:4013
paths:
  /health:
    get:
      operationId: health
      summary: Health del partner-service con estado de auth y colas internas
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [ok, service, auth, queues, readiness]
                properties:
                  ok: { type: boolean }
                  service: { type: string }
                  auth:
                    type: object
                    required:
                      [
                        adminStrictOidc,
                        adminOidcConfigured,
                        partnerStrictOidc,
                        partnerOidcConfigured,
                      ]
                    properties:
                      adminStrictOidc: { type: boolean }
                      adminOidcConfigured: { type: boolean }
                      partnerStrictOidc: { type: boolean }
                      partnerOidcConfigured: { type: boolean }
                  queues:
                    type: object
                    required: [catalogSync, catalogSyncOutbox]
                    properties:
                      catalogSync:
                        type: object
                        required: [pending, failed, sent]
                        properties:
                          pending: { type: integer }
                          failed: { type: integer }
                          sent: { type: integer }
                      catalogSyncOutbox:
                        type: object
                        required: [pending, failed, published]
                        properties:
                          pending: { type: integer }
                          failed: { type: integer }
                          published: { type: integer }
                  readiness:
                    type: object
                    required:
                      [
                        oidcConfigReady,
                        queuesHealthy,
                        recommendedForStrictOidc,
                        failedQueues,
                      ]
                    properties:
                      oidcConfigReady: { type: boolean }
                      queuesHealthy: { type: boolean }
                      recommendedForStrictOidc: { type: boolean }
                      failedQueues: { type: integer }
  /v1/partner/claims:
    post:
      operationId: createPartnerClaim
      summary: Crear solicitud de claim de gimnasio por representante
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PartnerClaimCreate" }
      responses:
        "201":
          description: Claim recibido
          content:
            application/json:
              schema:
                type: object
                required: [id, status]
                properties:
                  id: { type: string, format: uuid }
                  status:
                    type: string
                    enum: [pending_review]
        "400":
          description: Error de validación
  /v1/admin/partner/claims:
    get:
      operationId: adminListPartnerClaims
      summary: Lista claims recientes para revisión operativa
      security:
        - AdminOidcBearer: []
        - AdminLegacyToken: []
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 500, default: 200 }
      responses:
        "200":
          description: Lista de claims
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/PartnerClaimSummary" }
        "401":
          description: No autorizado
  /v1/admin/partner/claims/{id}/status:
    post:
      operationId: adminUpdatePartnerClaimStatus
      summary: Aprueba o rechaza un claim
      description: |
        Si `PARTNER_CLAIM_STATUS_WEBHOOK_URL` está definido en partner-service, tras persistir el estado
        se envía un POST JSON best-effort (`event: partner_claim_status_changed`) para integraciones externas (email, Slack, etc.).
      security:
        - AdminOidcBearer: []
        - AdminLegacyToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [approved, rejected]
      responses:
        "200":
          description: Estado actualizado
          content:
            application/json:
              schema:
                type: object
                required: [id, status]
                properties:
                  id: { type: string, format: uuid }
                  status: { type: string }
        "401":
          description: No autorizado
  /v1/partner/me/leads:
    get:
      operationId: partnerMyLeads
      summary: [DEPRECATED] Bandeja global de leads del partner
      deprecated: true
      security:
        - PartnerOidcBearer: []
        - PartnerDevEmail: []
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 500, default: 200 }
      responses:
        "410":
          description: Endpoint global deprecado; usar `/v1/partner/me/venues/{venueSlug}/leads`
  /v1/partner/me/leads/{id}/status:
    patch:
      operationId: partnerUpdateLeadStatus
      summary: [DEPRECATED] Actualizar estado de lead en endpoint global
      deprecated: true
      security:
        - PartnerOidcBearer: []
        - PartnerDevEmail: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [contacted, closed]
      responses:
        "410":
          description: Endpoint global deprecado; usar `/v1/partner/me/venues/{venueSlug}/leads/{id}/status`
  /v1/partner/me/profile:
    get:
      operationId: partnerMyProfile
      summary: [DEPRECATED] Perfil partner global
      deprecated: true
      security:
        - PartnerOidcBearer: []
        - PartnerDevEmail: []
      responses:
        "410":
          description: Endpoint global deprecado; usar `/v1/partner/me/venues/{venueSlug}/profile`
    put:
      operationId: partnerUpsertMyProfile
      summary: [DEPRECATED] Crear/actualizar perfil partner global
      deprecated: true
      security:
        - PartnerOidcBearer: []
        - PartnerDevEmail: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PartnerProfileUpdate" }
      responses:
        "410":
          description: Endpoint global deprecado; usar `/v1/partner/me/venues/{venueSlug}/profile`
  /v1/partner/me/venues:
    get:
      operationId: partnerMyVenues
      summary: Lista de centros con ownership activo del partner autenticado
      security:
        - PartnerOidcBearer: []
        - PartnerDevEmail: []
      responses:
        "200":
          description: Centros visibles por partner
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      required: [venueSlug, status, updatedAt]
                      properties:
                        venueSlug: { type: string }
                        status: { type: string }
                        updatedAt: { type: string, format: date-time }
  /v1/partner/me/venues/{venueSlug}/profile:
    get:
      operationId: partnerMyVenueProfile
      summary: Perfil editable del partner para un centro específico
      security:
        - PartnerOidcBearer: []
        - PartnerDevEmail: []
      parameters:
        - name: venueSlug
          in: path
          required: true
          schema: { type: string, minLength: 2, maxLength: 160 }
      responses:
        "200":
          description: Perfil por centro
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PartnerProfile" }
    put:
      operationId: partnerUpsertMyVenueProfile
      summary: Crear/actualizar perfil partner por centro
      security:
        - PartnerOidcBearer: []
        - PartnerDevEmail: []
      parameters:
        - name: venueSlug
          in: path
          required: true
          schema: { type: string, minLength: 2, maxLength: 160 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PartnerProfileUpdate" }
      responses:
        "200":
          description: Perfil actualizado
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PartnerProfile" }
  /v1/partner/me/plans:
    get:
      operationId: partnerMyPlans
      summary: [DEPRECATED] Listar planes partner globales
      deprecated: true
      security:
        - PartnerOidcBearer: []
        - PartnerDevEmail: []
      responses:
        "410":
          description: Endpoint global deprecado; usar `/v1/partner/me/venues/{venueSlug}/plans`
    post:
      operationId: partnerCreatePlan
      summary: [DEPRECATED] Crear plan partner global
      deprecated: true
      security:
        - PartnerOidcBearer: []
        - PartnerDevEmail: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PartnerPlanCreate" }
      responses:
        "410":
          description: Endpoint global deprecado; usar `/v1/partner/me/venues/{venueSlug}/plans`
  /v1/partner/me/plans/{id}:
    patch:
      operationId: partnerPatchPlan
      summary: [DEPRECATED] Editar plan partner global
      deprecated: true
      security:
        - PartnerOidcBearer: []
        - PartnerDevEmail: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PartnerPlanUpdate" }
      responses:
        "410":
          description: Endpoint global deprecado; usar `/v1/partner/me/venues/{venueSlug}/plans/{id}`
  /v1/partner/me/venues/{venueSlug}/plans:
    get:
      operationId: partnerMyVenuePlans
      summary: Listar planes del partner para un centro específico
      security:
        - PartnerOidcBearer: []
        - PartnerDevEmail: []
      parameters:
        - name: venueSlug
          in: path
          required: true
          schema: { type: string, minLength: 2, maxLength: 160 }
      responses:
        "200":
          description: Lista de planes por centro
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/PartnerPlan" }
    post:
      operationId: partnerCreateVenuePlan
      summary: Crear plan para un centro específico del partner
      security:
        - PartnerOidcBearer: []
        - PartnerDevEmail: []
      parameters:
        - name: venueSlug
          in: path
          required: true
          schema: { type: string, minLength: 2, maxLength: 160 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, minLength: 2, maxLength: 120 }
                description: { type: string, maxLength: 500 }
                period: { type: string, maxLength: 32 }
                priceLabel: { type: string, maxLength: 32 }
      responses:
        "201":
          description: Plan creado
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PartnerPlan" }
  /v1/partner/me/venues/{venueSlug}/plans/{id}:
    patch:
      operationId: partnerPatchVenuePlan
      summary: Editar plan para un centro específico
      security:
        - PartnerOidcBearer: []
        - PartnerDevEmail: []
      parameters:
        - name: venueSlug
          in: path
          required: true
          schema: { type: string, minLength: 2, maxLength: 160 }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PartnerPlanUpdate" }
      responses:
        "200":
          description: Plan actualizado
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PartnerPlan" }
  /v1/partner/me/venues/{venueSlug}/leads:
    get:
      operationId: partnerMyVenueLeads
      summary: Bandeja de leads para un centro específico del partner
      security:
        - PartnerOidcBearer: []
        - PartnerDevEmail: []
      parameters:
        - name: venueSlug
          in: path
          required: true
          schema: { type: string, minLength: 2, maxLength: 160 }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 500, default: 200 }
      responses:
        "200":
          description: Leads por centro
          content:
            application/json:
              schema:
                type: object
                required: [items, venues]
                properties:
                  venues:
                    type: array
                    items: { type: string }
                  items:
                    type: array
                    items:
                      type: object
                      required:
                        [id, venueSlug, intent, name, phone, status, createdAt]
                      properties:
                        id: { type: string, format: uuid }
                        venueSlug: { type: string }
                        intent: { type: string }
                        name: { type: string }
                        phone: { type: string }
                        email: { type: string, nullable: true }
                        status: { type: string }
                        createdAt: { type: string, format: date-time }
  /v1/partner/me/venues/{venueSlug}/leads/{id}/status:
    patch:
      operationId: partnerUpdateVenueLeadStatus
      summary: Actualizar estado de lead para un centro específico del partner
      security:
        - PartnerOidcBearer: []
        - PartnerDevEmail: []
      parameters:
        - name: venueSlug
          in: path
          required: true
          schema: { type: string, minLength: 2, maxLength: 160 }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [contacted, closed]
      responses:
        "200":
          description: Lead actualizado
          content:
            application/json:
              schema:
                type: object
                required: [id, status]
                properties:
                  id: { type: string, format: uuid }
                  status: { type: string }
                  firstContactedAt:
                    type: string
                    format: date-time
                    nullable: true
        "401":
          description: No autorizado
        "403":
          description: Lead no accesible o integración no configurada
  /v1/partner/me/venues/{venueSlug}/photos:
    get:
      operationId: partnerListVenuePhotos
      summary: Listar fotos de un venue del partner autenticado
      security:
        - PartnerOidcBearer: []
        - PartnerDevEmail: []
      parameters:
        - name: venueSlug
          in: path
          required: true
          schema: { type: string, minLength: 2, maxLength: 160 }
      responses:
        "200":
          description: Fotos activas del venue
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/PartnerVenuePhoto" }
        "401":
          description: No autorizado
        "403":
          description: Venue no asociado al partner
    post:
      operationId: partnerUploadVenuePhoto
      summary: Subir foto para un venue del partner autenticado
      security:
        - PartnerOidcBearer: []
        - PartnerDevEmail: []
      parameters:
        - name: venueSlug
          in: path
          required: true
          schema: { type: string, minLength: 2, maxLength: 160 }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Foto creada
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PartnerVenuePhoto" }
        "400":
          description: Validación (archivo inválido o límite alcanzado)
        "401":
          description: No autorizado
        "403":
          description: Venue no asociado al partner
  /v1/partner/me/venues/{venueSlug}/photos/{id}:
    delete:
      operationId: partnerDeleteVenuePhoto
      summary: Eliminar foto de un venue del partner autenticado
      security:
        - PartnerOidcBearer: []
        - PartnerDevEmail: []
      parameters:
        - name: venueSlug
          in: path
          required: true
          schema: { type: string, minLength: 2, maxLength: 160 }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Foto eliminada
          content:
            application/json:
              schema:
                type: object
                required: [id, status]
                properties:
                  id: { type: string, format: uuid }
                  status: { type: string, enum: [deleted] }
        "400":
          description: Foto no encontrada
        "401":
          description: No autorizado
        "403":
          description: Venue no asociado al partner
  /v1/partner/me/venues/{venueSlug}/photos/{id}/order:
    patch:
      operationId: partnerMoveVenuePhoto
      summary: Reordenar foto de un venue del partner autenticado
      security:
        - PartnerOidcBearer: []
        - PartnerDevEmail: []
      parameters:
        - name: venueSlug
          in: path
          required: true
          schema: { type: string, minLength: 2, maxLength: 160 }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [direction]
              properties:
                direction:
                  type: string
                  enum: [up, down]
      responses:
        "200":
          description: Orden actualizado
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }
        "400":
          description: Foto no encontrada o payload inválido
        "401":
          description: No autorizado
        "403":
          description: Venue no asociado al partner
  /v1/partner/me/venues/{venueSlug}/photos/reorder:
    patch:
      operationId: partnerReorderVenuePhotos
      summary: Reordenar todas las fotos de un venue del partner autenticado
      security:
        - PartnerOidcBearer: []
        - PartnerDevEmail: []
      parameters:
        - name: venueSlug
          in: path
          required: true
          schema: { type: string, minLength: 2, maxLength: 160 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [photoIds]
              properties:
                photoIds:
                  type: array
                  minItems: 1
                  maxItems: 12
                  items:
                    type: string
                    format: uuid
      responses:
        "200":
          description: Orden global actualizado
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }
        "400":
          description: Payload inválido o lista inconsistente
        "401":
          description: No autorizado
        "403":
          description: Venue no asociado al partner
  /v1/partner/me/venues/{venueSlug}/photos/{id}/cover:
    patch:
      operationId: partnerSetVenuePhotoCover
      summary: Marcar foto como portada del venue (la mueve al primer lugar)
      security:
        - PartnerOidcBearer: []
        - PartnerDevEmail: []
      parameters:
        - name: venueSlug
          in: path
          required: true
          schema: { type: string, minLength: 2, maxLength: 160 }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                cover: { type: boolean }
      responses:
        "200":
          description: Portada actualizada
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }
        "400":
          description: Foto no encontrada
        "401":
          description: No autorizado
        "403":
          description: Venue no asociado al partner
  /v1/admin/partner/catalog-sync/failures:
    get:
      operationId: adminPartnerCatalogSyncFailures
      summary: DLQ de sincronización partner->catalog
      security:
        - AdminOidcBearer: []
        - AdminLegacyToken: []
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
      responses:
        "200":
          description: Fallos de sync
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      required: [id, partnerEmail, venueSlug, attempts, createdAt]
                      properties:
                        id: { type: string, format: uuid }
                        partnerEmail: { type: string }
                        venueSlug: { type: string }
                        attempts: { type: integer }
                        lastError: { type: string, nullable: true }
                        createdAt: { type: string, format: date-time }
        "401":
          description: No autorizado
  /v1/admin/partner/catalog-sync/retry:
    post:
      operationId: adminPartnerCatalogSyncRetry
      summary: Reencola fallos de sync partner->catalog
      security:
        - AdminOidcBearer: []
        - AdminLegacyToken: []
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 500, default: 50 }
      responses:
        "200":
          description: Resultado retry
          content:
            application/json:
              schema:
                type: object
                required: [requeued, remaining]
                properties:
                  requeued: { type: integer }
                  remaining: { type: integer }
        "401":
          description: No autorizado
  /v1/admin/partner/catalog-sync/outbox/failures:
    get:
      operationId: adminPartnerCatalogSyncOutboxFailures
      summary: DLQ de publicación outbox partner->catalog-sync
      security:
        - AdminOidcBearer: []
        - AdminLegacyToken: []
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
      responses:
        "200":
          description: Fallos de publicación outbox
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      required: [id, partnerEmail, venueSlug, attempts, createdAt]
                      properties:
                        id: { type: string, format: uuid }
                        partnerEmail: { type: string }
                        venueSlug: { type: string }
                        attempts: { type: integer }
                        lastError: { type: string, nullable: true }
                        createdAt: { type: string, format: date-time }
        "401":
          description: No autorizado
  /v1/admin/partner/catalog-sync/outbox/retry:
    post:
      operationId: adminPartnerCatalogSyncOutboxRetry
      summary: Reencola fallos de publicación outbox partner->catalog-sync
      security:
        - AdminOidcBearer: []
        - AdminLegacyToken: []
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 500, default: 50 }
      responses:
        "200":
          description: Resultado retry de outbox
          content:
            application/json:
              schema:
                type: object
                required: [requeued, remaining]
                properties:
                  requeued: { type: integer }
                  remaining: { type: integer }
        "401":
          description: No autorizado
  /v1/admin/partner/ownerships:
    get:
      operationId: adminPartnerOwnerships
      summary: Lista relación partner↔venue para operación RBAC
      security:
        - AdminOidcBearer: []
        - AdminLegacyToken: []
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 500, default: 200 }
      responses:
        "200":
          description: Ownerships
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      required: [id, partnerEmail, venueSlug, status, createdAt, updatedAt]
                      properties:
                        id: { type: string, format: uuid }
                        partnerEmail: { type: string }
                        venueSlug: { type: string }
                        status: { type: string, enum: [active, revoked] }
                        createdAt: { type: string, format: date-time }
                        updatedAt: { type: string, format: date-time }
        "401":
          description: No autorizado
  /v1/admin/partner/ownerships/{id}/revoke:
    post:
      operationId: adminPartnerOwnershipRevoke
      summary: Revoca ownership partner↔venue
      security:
        - AdminOidcBearer: []
        - AdminLegacyToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string, maxLength: 500 }
      responses:
        "200":
          description: Ownership revocado
          content:
            application/json:
              schema:
                type: object
                required: [id, status]
                properties:
                  id: { type: string, format: uuid }
                  status: { type: string }
        "401":
          description: No autorizado
  /v1/admin/partner/ownership-audit:
    get:
      operationId: adminPartnerOwnershipAudit
      summary: Historial operativo de cambios de ownership
      security:
        - AdminOidcBearer: []
        - AdminLegacyToken: []
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
        - name: partnerEmail
          in: query
          schema: { type: string }
        - name: venueSlug
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Eventos de auditoría de ownership
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      required: [id, action, partnerEmail, venueSlug, actor, createdAt]
                      properties:
                        id: { type: string, format: uuid }
                        action: { type: string, enum: [revoked] }
                        partnerEmail: { type: string }
                        venueSlug: { type: string }
                        actor: { type: string }
                        reason: { type: string, nullable: true }
                        createdAt: { type: string, format: date-time }
        "401":
          description: No autorizado
components:
  securitySchemes:
    AdminOidcBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
    AdminLegacyToken:
      type: apiKey
      in: header
      name: x-admin-token
    PartnerOidcBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
    PartnerDevEmail:
      type: apiKey
      in: header
      name: x-partner-email
  schemas:
    PartnerClaimCreate:
      type: object
      required:
        [venueSlug, representativeName, representativeEmail, representativePhone]
      properties:
        venueSlug:
          type: string
          minLength: 2
          maxLength: 160
        representativeName:
          type: string
          minLength: 2
          maxLength: 160
        representativeEmail:
          type: string
          format: email
          maxLength: 200
        representativePhone:
          type: string
          minLength: 6
          maxLength: 40
        evidence:
          type: string
          maxLength: 1200
        claimKind:
          type: string
          enum: [existing, new]
          description: |
            existing = reclamo de ficha ya en catálogo; new = alta de centro nuevo (stub en catálogo al aprobar).
            Si se omite, el servicio asume existing (compatibilidad).
        newVenueDraft:
          $ref: "#/components/schemas/PartnerClaimNewVenueDraft"
          description: Obligatorio cuando claimKind es new (validación en partner-service).
    PartnerClaimNewVenueDraft:
      type: object
      required: [businessName, zone, venueType, address]
      properties:
        businessName: { type: string, minLength: 2, maxLength: 160 }
        zone: { type: string, minLength: 2, maxLength: 120 }
        venueType: { type: string, minLength: 2, maxLength: 48 }
        address: { type: string, maxLength: 320 }
        lat: { type: number }
        lng: { type: number }
    PartnerClaimSummary:
      type: object
      required:
        [
          id,
          venueSlug,
          representativeName,
          representativeEmail,
          representativePhone,
          status,
          createdAt,
        ]
      properties:
        id: { type: string, format: uuid }
        venueSlug: { type: string }
        representativeName: { type: string }
        representativeEmail: { type: string }
        representativePhone: { type: string }
        evidence: { type: string, nullable: true }
        claimKind:
          type: string
          enum: [existing, new]
        newVenueDraft:
          type: object
          additionalProperties: true
          nullable: true
          description: Copia del borrador enviado en el claim (solo claimKind new).
        status:
          type: string
          enum: [pending_review, approved, rejected]
        createdAt: { type: string, format: date-time }
        updatedAt:
          type: string
          format: date-time
          description: Última actualización del registro (útil para línea de tiempo en revisión admin).
    PartnerProfile:
      type: object
      required: [partnerEmail, venueSlug]
      properties:
        partnerEmail: { type: string, format: email }
        venueSlug: { type: string }
        businessName: { type: string, nullable: true }
        description: { type: string, nullable: true }
        scheduleSummary: { type: string, nullable: true }
        contactPhone: { type: string, nullable: true }
        contactEmail: { type: string, nullable: true }
        contactWhatsapp: { type: string, nullable: true }
        photoUrls:
          type: array
          items: { type: string, format: uri }
    PartnerProfileUpdate:
      type: object
      properties:
        businessName: { type: string, maxLength: 160 }
        description: { type: string, maxLength: 1200 }
        scheduleSummary: { type: string, maxLength: 500 }
        contactPhone: { type: string, maxLength: 40 }
        contactEmail: { type: string, format: email, maxLength: 200 }
        contactWhatsapp: { type: string, maxLength: 200 }
        photoUrls:
          type: array
          maxItems: 12
          items:
            type: string
            format: uri
    PartnerPlan:
      type: object
      required: [id, venueSlug, name, active]
      properties:
        id: { type: string, format: uuid }
        venueSlug: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }
        period: { type: string, nullable: true }
        priceLabel: { type: string, nullable: true }
        active: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    PartnerPlanCreate:
      type: object
      required: [venueSlug, name]
      properties:
        venueSlug: { type: string, minLength: 2, maxLength: 160 }
        name: { type: string, minLength: 2, maxLength: 120 }
        description: { type: string, maxLength: 500 }
        period: { type: string, maxLength: 32 }
        priceLabel: { type: string, maxLength: 32 }
    PartnerPlanUpdate:
      type: object
      properties:
        name: { type: string, minLength: 2, maxLength: 120 }
        description: { type: string, maxLength: 500 }
        period: { type: string, maxLength: 32 }
        priceLabel: { type: string, maxLength: 32 }
        active: { type: boolean }
    PartnerVenuePhoto:
      type: object
      required: [id, venueSlug, url, mimeType, sizeBytes, sortOrder, createdAt]
      properties:
        id: { type: string, format: uuid }
        venueSlug: { type: string }
        url: { type: string, format: uri }
        mimeType: { type: string }
        sizeBytes: { type: integer }
        sortOrder: { type: integer }
        createdAt: { type: string, format: date-time }
