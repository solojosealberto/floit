services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_USER: floit
      POSTGRES_PASSWORD: floit
      POSTGRES_DB: floit_catalog
    ports:
      - "5432:5432"
    volumes:
      - floit_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U floit -d floit_catalog"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  floit_pg:
